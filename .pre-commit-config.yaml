# Pre-commit gate for prop-farm.
#
# Stages:
#   pre-commit (default) — fast checks: hygiene + ruff (lint+format) + mypy --strict.
#   pre-push             — slower checks: pytest -q. Pytest is on pre-push (not commit)
#                          so an empty `tests/` tree does not block early commits;
#                          once tests exist they still gate `git push`.
#
# Install both hook types with:
#   pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push

default_install_hook_types: [pre-commit, pre-push]
default_language_version:
  python: python3.12

# Per-hook excludes for scripts/spike_mt5.py live with each hook below.
# Hygiene hooks (trailing-whitespace, EOF, check-yaml/toml) DO run on the spike
# — only ruff/ruff-format/mypy/pytest exclude it, because that script imports
# MetaTrader5 (no macOS/Linux wheel) and is a throwaway pending ADR-0003.

repos:
  # --------------------------------------------------------------------------
  # Hygiene: cheap insurance against whitespace/newline/parse errors.
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]

  # --------------------------------------------------------------------------
  # Ruff: lint (with autofix) + format. Config lives in pyproject.toml.
  # Rev pins the hook repo; the underlying ruff binary it ships still satisfies
  # `ruff>=0.5` from pyproject.toml's [project.optional-dependencies].dev.
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
        exclude: ^scripts/spike_mt5\.py$
      - id: ruff-format
        stages: [pre-commit]
        exclude: ^scripts/spike_mt5\.py$

  # --------------------------------------------------------------------------
  # mypy --strict. Mirrors the [tool.mypy] block in pyproject.toml.
  # additional_dependencies seeds the hook's isolated env with the type stubs
  # we know we'll need early in Phase 0. Add more as modules import them.
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - polars
          - pydantic
          - types-PyYAML
          - pandas-stubs
          - pyarrow
          - numpy
        stages: [pre-commit]
        exclude: ^scripts/spike_mt5\.py$

  # --------------------------------------------------------------------------
  # pytest on pre-push only. pass_filenames=false → pytest is invoked once,
  # not once per changed file. Runs `pytest -q` against the repo's pyproject
  # config (testpaths=["tests"]).
  #
  # language: system runs pytest from the developer's active environment
  # (typically `.venv` activated via `uv venv && uv pip install -e ".[dev]"`).
  # This avoids the pre-commit isolated venv missing project deps (numpy,
  # pandas, pyarrow, scipy) that test modules import — earlier `language: python`
  # blocked pre-push the moment the first real test landed.
  #
  # The `bash -c` wrapper maps pytest's exit-code-5 ("no tests collected") to
  # success. Once tests exist, exit-code-5 stops appearing and the gate is real.
  # Any other non-zero exit (failure, collection error) still fails the push.
  # --------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'pytest -q "$@"; rc=$?; [ $rc -eq 5 ] && exit 0 || exit $rc' --
        language: system
        pass_filenames: false
        stages: [pre-push]
        exclude: ^scripts/spike_mt5\.py$
